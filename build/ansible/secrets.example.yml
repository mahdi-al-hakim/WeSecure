---
# Copy to secrets.yml and fill in. NEVER commit secrets.yml (it is .gitignored).
# Encrypt in real use:  ansible-vault encrypt secrets.yml
#
# These are the values the published WeSecure box uses. Change them for your own
# build if you like; the writeup passphrases (rockyou) must stay crackable if you
# want the documented path to hold (a5dam. and 142536 are both in rockyou.txt).

# --- account passwords ---
pw_john: "REDACTED_set_me"          # published box: 11-char, discoverable via SSH-key crack path
pw_mmcartney: "REDACTED_set_me"     # published box: 10-char, in the FTP temporary_pass.txt file
pw_root_2fa: "REDACTED_set_me"      # published box: 29-char, never needed by the intended path
pw_root: "REDACTED_set_me"          # published box: 24-char

# --- SSH key passphrase for john's key (must be in rockyou for the writeup) ---
john_key_passphrase: "142536"

# --- steganography passphrase (must be in rockyou for the writeup) ---
stego_passphrase: "a5dam."

# --- 2FA escape passkey (planted in /etc/.esc-key, read via HTTP symlink) ---
esc_passkey: "REDACTED_set_me"      # published box: 26-char

# --- flags (32-char lowercase hex; generate fresh, e.g. `openssl rand -hex 16`) ---
user_flag: "REDACTED_32_hex"
root_flag: "REDACTED_32_hex"

# --- the FTP temporary-passwords file body (contains pw_mmcartney as ID2) ---
# Kept here so the file content and the real password stay in sync.
