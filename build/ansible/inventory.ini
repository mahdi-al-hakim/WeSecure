# Target the machine being provisioned.
# Packer injects its own temporary inventory; for a manual run against a fresh
# Ubuntu 24.04 host, set the IP/user below and run:
#   ansible-playbook site.yml -e @secrets.yml
[wesecure]
target ansible_host=127.0.0.1 ansible_port=22

[wesecure:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
